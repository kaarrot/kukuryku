[package]
name = "speak_tts"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "speak"
path = "src/main.rs"

[dependencies]
# kaarrot fork: CPU decode fast path (forward_decode_token_into + repack kernels).
# Enable at runtime with CANDLE_CPU_DECODE_EXECUTOR=1 and build with
# RUSTFLAGS='-C target-cpu=native' (AVX2+FMA) to engage the SIMD kernels.
candle-core = { git = "https://github.com/kaarrot/candle", branch = "feature/cpu-decode-optim-squashed" }
candle-nn = { git = "https://github.com/kaarrot/candle", branch = "feature/cpu-decode-optim-squashed" }
candle-transformers = { git = "https://github.com/kaarrot/candle", branch = "feature/cpu-decode-optim-squashed" }
tokenizers = "0.20"
hf-hub = "0.4"
serde_json = "1"
bytemuck = "1"
anyhow = "1"

[profile.release]
opt-level = 3
