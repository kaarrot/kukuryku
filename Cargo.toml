[package]
name = "kokoro"
version = "0.1.0"
edition = "2024"

[dependencies]
# ONNX Runtime, loaded dynamically (dlopen a libonnxruntime.so at runtime).
ort = { version = "=2.0.0-rc.12", features = ["load-dynamic"] }
hf-hub = "0.4"
serde_json = "1"
bytemuck = "1"
anyhow = "1"

[profile.release]
opt-level = 3
